version: "3.9"

services:

  # --- Flask Application ---
  flask:
    build:
      context: ./app          # Build Dockerfile from /app directory
    container_name: flask_app
    restart: unless-stopped   # Auto-restart on crash (SRE reliability pattern)
    environment:
      - APP_ENV=production
    expose:
      - "5000"                # Internal only — NOT exposed to host directly
    networks:
      - app_network
    healthcheck:              # Docker monitors container health
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"               # Exposed to host — all traffic enters here
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # Mount config (read-only)
    depends_on:
      flask:
        condition: service_healthy   # Wait for Flask healthcheck to pass
    networks:
      - app_network

# Shared internal network — containers talk by service name
networks:
  app_network:
    driver: bridge
