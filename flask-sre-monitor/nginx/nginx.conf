# Nginx Reverse Proxy Configuration
# Sits in front of Flask/Gunicorn — handles incoming HTTP traffic

events {
    worker_connections 1024;
}

http {

    # Rate limiting zone — 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream block — points to Flask container by service name
    upstream flask_app {
        server flask:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Access and error logs
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # Proxy all requests → Flask
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # Nginx health check endpoint (does NOT hit Flask)
        location /nginx-health {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}
